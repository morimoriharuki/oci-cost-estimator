# OCI Cost Estimator - 構成定義サンプル
# partNumber は services/*.yaml を参照して特定する
# unit_type: hourly（時間課金）/ monthly（月額固定）/ request（リクエスト数）/ free（無料）

project: "サンプル構成見積り"
currency: JPY
hours_per_month: 744  # 31日 × 24時間

resources:
  # Compute E4 × 2台（OCPUとMemoryは別行）
  - name: "Webサーバー OCPU (E4 × 4OCPU × 2台)"
    partNumber: "B93113"
    qty: 8            # 4OCPU × 2台
    unit_type: hourly

  - name: "Webサーバー Memory (E4 × 32GB × 2台)"
    partNumber: "B93114"
    qty: 64           # 32GB × 2台
    unit_type: hourly

  # Block Volume（Storage + VPU はセットで必要）
  - name: "ブロックボリューム Storage (500GB × 2本)"
    partNumber: "B91961"
    qty: 1000         # 500GB × 2本
    unit_type: monthly

  - name: "ブロックボリューム VPU (Balanced 10VPU × 500GB × 2本)"
    partNumber: "B91962"
    qty: 10000        # 10 VPU × 1000GB
    unit_type: monthly

  # Autonomous DB ATP
  - name: "ADB ATP ECPU (4ECPU)"
    partNumber: "B95702"
    qty: 4
    unit_type: hourly

  - name: "ADB ATP Storage (1TB)"
    partNumber: "B95706"
    qty: 1024
    unit_type: monthly

  # Object Storage（無料枠超過分）
  - name: "オブジェクトストレージ (1TB)"
    partNumber: "B91628"
    qty: 1000
    unit_type: monthly
    note: "20GB まで Always Free"

  # アウトバウンド通信（無料枠超過分）
  - name: "アウトバウンド通信 APAC (100GB)"
    partNumber: "B93455"
    qty: 100
    unit_type: monthly
    note: "月10TB まで Always Free"
